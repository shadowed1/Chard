description "Chard autostart. Syntax is based off of original .conf by Days and using DennyL's vsh borealis wrapper."
# Debug:
# grep chard /var/log/messages | tail -10
start on started ui
stop on stopping ui
task
script
    logger -t chard "CHARD: starting"
    BASHRC="/home/chronos/user/.bashrc"
    i=0
    while [ ! -f "$BASHRC" ] && [ "$i" -lt 30 ]; do
        sleep 1
        i=$((i + 1))
    done
    if [ ! -f "$BASHRC" ]; then
        logger -t chard "CHARD: timed out waiting for user session"
        exit 1
    fi
    WAYLAND_DISPLAY=""
    XDG_RUNTIME_DIR=""
    for pid in $(ls /proc | grep -E '^[0-9]+$'); do
        ENV="/proc/$pid/environ"
        [ -r "$ENV" ] || continue
        grep -qz 'WAYLAND_DISPLAY' "$ENV" 2>/dev/null || continue
        [ "$(stat -c '%U' "$ENV" 2>/dev/null)" = "chronos" ] || continue
        ENV_RAW=$(tr '\0' '\n' < "$ENV")
        WAYLAND_DISPLAY=$(echo "$ENV_RAW" | sed -n 's/^WAYLAND_DISPLAY=//p' | head -1)
        XDG_RUNTIME_DIR=$(echo "$ENV_RAW"  | sed -n 's/^XDG_RUNTIME_DIR=//p'  | head -1)
        break
    done
    if [ -z "$WAYLAND_DISPLAY" ]; then
        logger -t chard "CHARD: could not find WAYLAND_DISPLAY in chronos session"
        exit 1
    fi
    logger -t chard "CHARD: WAYLAND=$WAYLAND_DISPLAY XDG=$XDG_RUNTIME_DIR"
    exec sudo -u chronos \
        env \
            WAYLAND_DISPLAY="$WAYLAND_DISPLAY" \
            XDG_RUNTIME_DIR="$XDG_RUNTIME_DIR" \
        /usr/local/bin/chard-start
end script
