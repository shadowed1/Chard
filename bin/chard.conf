description "Chard autostart. Syntax is based off of original .conf by Days and using DennyL's vsh borealis wrapper."
start on started ui
stop on stopping ui
task
script
    CHARD_USER=$(awk -F: '$3 == 1000 {print $1}' /etc/passwd)
    CHARD_USER="${CHARD_USER:-chronos}"
    if [ -f "/home/chronos/user/.bashrc" ]; then
        BASHRC="/home/chronos/user/.bashrc"
    else
        BASHRC="/home/$CHARD_USER/.bashrc"
    fi
    i=0
    while [ ! -f "$BASHRC" ] && [ "$i" -lt 30 ]; do
        sleep 1
        i=$((i + 1))
    done
    if [ ! -f "$BASHRC" ]; then
        logger -t chard "Timed out waiting for $BASHRC"
        exit 1
    fi
    CHARD_ROOT=$(sed -n \
        '/<<< CHARD ENV MARKER <<</,/<<< END CHARD ENV MARKER <<</p' \
        "$BASHRC" | \
        sed -n 's|.*source "\(.*\)/\.chardrc".*|\1|p')
    if [ -z "$CHARD_ROOT" ]; then
        logger -t chard "Could not parse $CHARD_ROOT from marker in $BASHRC"
        exit 1
    fi
    if [ ! -x "$CHARD_ROOT/bin/chard" ]; then
        logger -t chard "$CHARD_ROOT/bin/chard not found"
        exit 1
    fi
    WAYLAND_DISPLAY="${WAYLAND_DISPLAY:-wayland-0}"
    XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/chrome}"
    logger -t chard "CHARD: user=$CHARD_USER root=$CHARD_ROOT wayland=$WAYLAND_DISPLAY xdg=$XDG_RUNTIME_DIR"
    exec script -q -c \
        "sudo -u $CHARD_USER env CHARD_ROOT=$CHARD_ROOT WAYLAND_DISPLAY=$WAYLAND_DISPLAY XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR $CHARD_ROOT/bin/chard root" \
        /dev/null
end script
# Debugging:
# grep chard /var/log/messages | tail -5
# Permissions:
# sudo chmod 644 /etc/init/chard.conf
