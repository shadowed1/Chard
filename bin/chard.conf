description "Chard autostart. Syntax is based off of original .conf by Days and using DennyL's vsh borealis wrapper."
# Debug: grep chard /var/log/messages | tail -10
start on started ui
stop on stopping ui
task
script
    logger -t chard "CHARD: starting"
    CHARD_USER=$(awk -F: '$3 == 1000 {print $1}' /etc/passwd)
    CHARD_USER="${CHARD_USER:-chronos}"
    BASHRC=""
    i=0
    while [ "$i" -lt 60 ]; do
        if [ -f "/home/chronos/user/.bashrc" ]; then
            BASHRC="/home/chronos/user/.bashrc"
            break
        elif [ -f "/home/$CHARD_USER/.bashrc" ]; then
            BASHRC="/home/$CHARD_USER/.bashrc"
            break
        fi
        sleep 1
        i=$((i + 1))
    done
    if [ -z "$BASHRC" ]; then
        logger -t chard "CHARD: timed out waiting for .bashrc"
        exit 1
    fi
    CHARD_ROOT=$(sed -n \
        '/<<< CHARD ENV MARKER <<</,/<<< END CHARD ENV MARKER <<</p' \
        "$BASHRC" | \
        sed -n 's|.*source "\(.*\)/\.chardrc".*|\1|p')
    if [ -z "$CHARD_ROOT" ]; then
        logger -t chard "CHARD: could not parse CHARD_ROOT from marker in $BASHRC"
        exit 1
    fi
    if [ ! -x "$CHARD_ROOT/bin/chard" ]; then
        logger -t chard "CHARD: binary missing at $CHARD_ROOT/bin/chard"
        exit 1
    fi
    WAYLAND_DISPLAY="${WAYLAND_DISPLAY:-wayland-0}"
    XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/chrome}"
    logger -t chard "CHARD: user=$CHARD_USER root=$CHARD_ROOT bashrc=$BASHRC wayland=$WAYLAND_DISPLAY xdg=$XDG_RUNTIME_DIR"

    exec script -q -c \
        "sudo -u $CHARD_USER env CHARD_ROOT=$CHARD_ROOT WAYLAND_DISPLAY=$WAYLAND_DISPLAY XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR $CHARD_ROOT/bin/chard root" \
        /dev/null
end script
grep chard /var/log/messages | tail -10
