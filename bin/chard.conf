sudo tee /etc/init/chard.conf << 'EOF'
description "Chard autostart. Syntax is based off of original .conf by Days and using DennyL's vsh borealis wrapper."
start on started ui
stop on stopping ui
task
script
    CHARD_USER=$(awk -F: '$3 == 1000 {print $1}' /etc/passwd)
    CHARD_USER="${CHARD_USER:-chronos}"
    if [ -f "/home/chronos/user/.bashrc" ]; then
        BASHRC="/home/chronos/user/.bashrc"
    else
        BASHRC="/home/$CHARD_USER/.bashrc"
    fi
    i=0
    while [ ! -f "$BASHRC" ] && [ "$i" -lt 30 ]; do
        sleep 1
        i=$((i + 1))
    done
    if [ ! -f "$BASHRC" ]; then
        logger -t chard "CHARD: timed out waiting for $BASHRC"
        exit 1
    fi
    WAYLAND_DISPLAY="${WAYLAND_DISPLAY:-wayland-0}"
    XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/chrome}"
    logger -t chard "CHARD: user=$CHARD_USER bashrc=$BASHRC wayland=$WAYLAND_DISPLAY xdg=$XDG_RUNTIME_DIR"
    exec script -q -c \
        "sudo -u $CHARD_USER env WAYLAND_DISPLAY=$WAYLAND_DISPLAY XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR /usr/local/bin/chard-start" \
        /dev/null
end script
EOF
sudo chmod 644 /etc/init/chard.conf
sudo initctl reload-configuration
sudo initctl stop chard 2>/dev/null
sudo initctl start chard
